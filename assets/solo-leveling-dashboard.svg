<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Dashboard de perfil Neto-Marcos</title>
  <desc id="desc">Painel roxo e azul em estilo solo leveling com status, habilidades, linguagens e progresso.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#130B24"/>
      <stop offset="0.45" stop-color="#070B18"/>
      <stop offset="1" stop-color="#100722"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17142D"/>
      <stop offset="1" stop-color="#0B1022"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.52" stop-color="#D946EF"/>
      <stop offset="1" stop-color="#58A6FF"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop stop-color="#49307A"/>
      <stop offset="1" stop-color="#E052FF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.7 0 0 0 0.3 0 0.1 0 0 0 0.95 0 0 0 1 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font:800 55px 'Segoe UI',Arial,sans-serif;fill:#F8F7FF;letter-spacing:.5px}
      .subtitle{font:600 20px 'Segoe UI',Arial,sans-serif;fill:#BFD0FF}
      .small{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#AEB7D7}
      .label{font:700 16px 'Segoe UI',Arial,sans-serif;fill:#F5F3FF}
      .muted{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#7F89B2}
      .number{font:800 28px 'Segoe UI',Arial,sans-serif;fill:#FFFFFF}
      .chip{font:800 15px 'Segoe UI',Arial,sans-serif;fill:#FFFFFF}
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#page)"/>
  <circle cx="980" cy="90" r="170" fill="#7C3AED" opacity=".13" filter="url(#glow)"/>
  <circle cx="170" cy="660" r="180" fill="#2563EB" opacity=".11" filter="url(#glow)"/>

  <rect x="56" y="36" width="1088" height="72" rx="31" fill="#0B1022" stroke="#7C3AED" stroke-opacity=".55" stroke-width="2"/>
  <text x="95" y="81" class="label">Neto-Marcos</text>
  <text x="270" y="81" class="small">Dashboard</text>
  <text x="395" y="81" class="small">Projetos</text>
  <rect x="740" y="56" width="250" height="32" rx="16" fill="#201744" stroke="#8B5CF6" stroke-opacity=".75"/>
  <text x="765" y="78" class="muted">Pesquisar skill...</text>
  <circle cx="1035" cy="72" r="18" fill="#26164B" stroke="#8B5CF6"/>
  <circle cx="1080" cy="72" r="18" fill="#26164B" stroke="#8B5CF6"/>

  <rect x="60" y="140" width="560" height="315" rx="18" fill="url(#panel)" stroke="#31265A"/>
  <text x="100" y="204" class="title">SOLO LEVELING</text>
  <text x="100" y="255" class="title" font-size="42">DEV SYSTEM</text>
  <rect x="100" y="283" width="360" height="4" rx="2" fill="url(#neon)" opacity=".8"/>
  <circle cx="210" cy="358" r="68" fill="#1B1433" stroke="#D946EF" stroke-width="7" filter="url(#glow)"/>
  <circle cx="210" cy="358" r="42" fill="#7C3AED" opacity=".45"/>
  <path d="M178 381c20-52 74-50 67 8-13-12-21-13-34-5-12-8-21-7-33-3Z" fill="#0B1022"/>
  <circle cx="193" cy="344" r="8" fill="#0B1022"/>
  <circle cx="226" cy="344" r="8" fill="#0B1022"/>
  <text x="165" y="447" class="small">Marcos Neto</text>
  <text x="330" y="325" class="label">Classe: Dev Trainer</text>
  <text x="330" y="360" class="small">Rank: Junior em evolucao</text>
  <text x="330" y="395" class="small">Foco: Java + Web</text>
  <text x="330" y="430" class="small">Quest: Portfolio forte</text>

  <rect x="100" y="495" width="420" height="22" rx="11" fill="#25183F"/>
  <rect x="100" y="495" width="265" height="22" rx="11" fill="url(#neon)" filter="url(#glow)"/>
  <text x="100" y="544" class="muted">XP atual</text>
  <text x="280" y="544" class="muted">Projetos reais</text>
  <text x="455" y="544" class="muted">Proxima insignia</text>

  <rect x="662" y="140" width="420" height="315" rx="18" fill="url(#panel)" stroke="#31265A"/>
  <text x="708" y="195" class="label">HABIT TRACKER</text>
  <line x1="710" y1="380" x2="1005" y2="380" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  <line x1="710" y1="230" x2="710" y2="380" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  <g opacity=".25" stroke="#7C3AED">
    <line x1="750" y1="230" x2="750" y2="380"/>
    <line x1="790" y1="230" x2="790" y2="380"/>
    <line x1="830" y1="230" x2="830" y2="380"/>
    <line x1="870" y1="230" x2="870" y2="380"/>
    <line x1="910" y1="230" x2="910" y2="380"/>
    <line x1="950" y1="230" x2="950" y2="380"/>
    <line x1="990" y1="230" x2="990" y2="380"/>
  </g>
  <rect x="730" y="345" width="48" height="35" rx="10" fill="url(#bar)" filter="url(#glow)"/>
  <rect x="795" y="320" width="48" height="60" rx="10" fill="url(#bar)" filter="url(#glow)"/>
  <rect x="860" y="275" width="48" height="105" rx="10" fill="url(#bar)" filter="url(#glow)"/>
  <rect x="925" y="235" width="48" height="145" rx="10" fill="url(#bar)" filter="url(#glow)"/>
  <text x="710" y="424" class="number">9</text>
  <text x="752" y="424" class="small">contribuicoes no ano</text>
  <rect x="710" y="438" width="260" height="8" rx="4" fill="#25183F"/>
  <rect x="710" y="438" width="170" height="8" rx="4" fill="url(#neon)"/>

  <rect x="60" y="490" width="340" height="210" rx="18" fill="url(#panel)" stroke="#31265A"/>
  <text x="100" y="542" class="label">SKILL TRACKER</text>
  <circle cx="112" cy="584" r="22" fill="#34205F" stroke="#8B5CF6"/>
  <text x="105" y="591" class="chip">1</text>
  <text x="150" y="589" class="small">Java</text>
  <rect x="150" y="602" width="170" height="7" rx="4" fill="#25183F"/>
  <rect x="150" y="602" width="125" height="7" rx="4" fill="url(#neon)"/>
  <circle cx="112" cy="635" r="22" fill="#34205F" stroke="#8B5CF6"/>
  <text x="104" y="642" class="chip">2</text>
  <text x="150" y="640" class="small">JavaScript</text>
  <rect x="150" y="653" width="170" height="7" rx="4" fill="#25183F"/>
  <rect x="150" y="653" width="95" height="7" rx="4" fill="url(#neon)"/>

  <rect x="430" y="490" width="300" height="210" rx="18" fill="url(#panel)" stroke="#31265A"/>
  <text x="475" y="542" class="label">GOAL COMPLETION</text>
  <circle cx="580" cy="618" r="62" fill="none" stroke="#2B214B" stroke-width="26"/>
  <path d="M580 556a62 62 0 1 1-58 84" stroke="url(#neon)" stroke-width="26" stroke-linecap="round" filter="url(#glow)"/>
  <text x="552" y="615" class="number">50%</text>
  <text x="538" y="642" class="muted">XP dev</text>

  <rect x="760" y="490" width="322" height="210" rx="18" fill="url(#panel)" stroke="#31265A"/>
  <text x="805" y="542" class="label">LINGUAGENS USADAS</text>
  <rect x="805" y="575" width="215" height="32" rx="12" fill="#1D2B53"/>
  <text x="825" y="597" class="small">HTML</text>
  <rect x="805" y="617" width="175" height="32" rx="12" fill="#3B4CCA"/>
  <text x="825" y="639" class="small">CSS</text>
  <rect x="805" y="659" width="145" height="32" rx="12" fill="#7C3AED"/>
  <text x="825" y="681" class="small">JavaScript</text>
  <circle cx="1030" cy="615" r="44" fill="#241347" stroke="#8B5CF6" stroke-width="7" filter="url(#glow)"/>
  <text x="1008" y="624" class="chip">JAVA</text>
</svg>
